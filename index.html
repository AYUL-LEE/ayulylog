<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>슬롯 로그</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F7F4F0;
    --surface: #FFFFFF;
    --surface2: #F0EDE8;
    --border: #E8E3DC;
    --text: #2C2825;
    --text-muted: #9B9189;
    --accent: #E8A598;
    --accent2: #A8C5B5;
    --accent3: #B8A8D4;
    --accent4: #F0D09A;
    --slot-active: #FFF0EC;
    --slot-active-border: #E8A598;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Gowun Dodum', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    max-width: 430px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
  }

  /* ── 상단 헤더 ── */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .date-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .date-nav button {
    background: var(--surface2);
    border: none;
    border-radius: 50%;
    width: 30px; height: 30px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .date-nav button:hover { background: var(--border); }

  .date-label {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.03em;
  }
  .date-label strong {
    color: var(--text);
    font-size: 15px;
    display: block;
    text-align: center;
  }

  /* ── 현재 슬롯 포커스 카드 ── */
  .focus-card {
    background: linear-gradient(135deg, #FFF5F2 0%, #FFF0EC 100%);
    border: 1.5px solid var(--slot-active-border);
    border-radius: var(--radius);
    padding: 12px 14px 10px;
  }

  .focus-card-top {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    align-items: center;
    margin-bottom: 10px;
  }

  /* 왼쪽: 현재 슬롯 */
  .focus-slot-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .focus-slot-label {
    font-size: 10px;
    color: var(--text-muted);
  }
  .focus-slot-time {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .focus-category {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 1px;
  }
  .focus-category.empty { font-style: italic; }

  /* 가운데: 현재 시각 */
  .focus-now-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .focus-now-label {
    font-size: 10px;
    color: var(--text-muted);
  }
  .focus-now-time {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  /* 오른쪽: 남은 시간 텍스트 */
  .focus-timer-block {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
  }
  .focus-timer-label {
    font-size: 10px;
    color: var(--text-muted);
  }
  .focus-timer-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }

  /* 프로그레스 바 */
  .focus-progress-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .focus-progress-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .focus-progress-bar {
    flex: 1;
    height: 6px;
    background: #F0D8D2;
    border-radius: 3px;
    overflow: hidden;
  }
  .focus-progress-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 1s linear;
  }

  /* ── 타임라인 ── */
  .timeline-section {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 80px;
  }

  /* 한 행 = 시간레이블 + 슬롯4개 + 📝버튼 */
  .hour-row {
    display: grid;
    grid-template-columns: 36px 1fr 1fr 1fr 1fr 28px;
    gap: 3px;
    align-items: stretch;
    margin-bottom: 3px;
  }

  .hour-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
    padding-top: 2px;
  }

  .hour-note-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    background: none;
    border: 1px dashed var(--border);
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.15s;
    color: var(--text-muted);
    padding: 0;
  }
  .hour-note-btn:hover {
    border-color: var(--accent2);
    background: #F0F8F4;
  }
  .hour-note-btn.has-data {
    border-style: solid;
    border-color: var(--accent2);
    background: #F0F8F4;
    color: var(--accent2);
  }

  .slot {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 5px 4px;
    cursor: pointer;
    transition: all 0.15s;
    min-height: 40px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .slot:hover {
    border-color: var(--accent);
    background: #FFF8F6;
  }
  .slot.active {
    background: var(--slot-active);
    border-color: var(--slot-active-border);
    border-width: 2px;
    box-shadow: 0 0 0 2px rgba(232,165,152,0.3);
  }
  .slot.past {
    opacity: 0.55;
  }
  .slot.selected {
    outline: 2px solid var(--accent3);
    outline-offset: -1px;
    background: #F0ECFA !important;
  }

  .slot-time {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text-muted);
  }
  .slot.active .slot-time { color: var(--accent); }
  .slot.colored .slot-time { color: rgba(0,0,0,0.4); }

  /* 카테고리 색상 채우기 */
  .slot.colored {
    border-color: transparent;
  }
  .slot.colored:hover {
    filter: brightness(0.95);
  }

  .slot-cat-label {
    font-size: 8px;
    color: rgba(0,0,0,0.5);
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 100%;
  }

  /* 시간 레이블 클릭 */
  .hour-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding-right: 4px;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.15s;
    user-select: none;
  }
  .hour-label:hover { background: var(--surface2); }
  .hour-label.row-selected { color: var(--accent3); font-weight: 600; }

  /* 일괄 선택 바 */
  .bulk-bar {
    position: fixed;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 28px);
    max-width: 402px;
    background: var(--surface);
    border: 1.5px solid var(--accent3);
    border-radius: 14px;
    padding: 12px 14px;
    z-index: 150;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: none;
    animation: slideUp 0.2s ease;
  }
  .bulk-bar.open { display: block; }
  .bulk-bar-title {
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .bulk-bar-title span { color: var(--accent3); font-weight: 600; }
  .bulk-bar-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }
  .bulk-cat-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Gowun Dodum', sans-serif;
  }
  .bulk-cat-chip:hover {
    background: var(--accent3);
    border-color: var(--accent3);
    color: white;
  }
  .bulk-input-row {
    display: flex;
    gap: 6px;
  }
  .bulk-input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 7px 10px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
  }
  .bulk-input:focus { border-color: var(--accent3); }
  .bulk-save-btn {
    background: var(--accent3);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    cursor: pointer;
  }
  .bulk-cancel-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-size: 11px;
    cursor: pointer;
    font-family: 'Gowun Dodum', sans-serif;
    margin-top: 8px;
    display: block;
    text-align: right;
    width: 100%;
  }

  /* ── 시간당 기록 패널 ── */
  .hour-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  .hour-panel.open { border-color: var(--accent2); }

  .hour-panel-header {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    cursor: pointer;
    user-select: none;
  }
  .hour-panel-header .icon { font-size: 12px; }
  .hour-panel-header .title {
    flex: 1;
    font-size: 11px;
    color: var(--text-muted);
  }
  .hour-panel.open .hour-panel-header .title { color: var(--accent2); }
  .hour-panel-header .arrow {
    font-size: 10px;
    color: var(--text-muted);
    transition: transform 0.2s;
  }
  .hour-panel.open .arrow { transform: rotate(180deg); }

  .hour-panel-body {
    display: none;
    padding: 0 12px 12px;
    gap: 8px;
    flex-direction: column;
  }
  .hour-panel.open .hour-panel-body { display: flex; }

  .record-field label {
    font-size: 10px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 3px;
  }
  .record-field input, .record-field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 9px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    color: var(--text);
    outline: none;
    resize: none;
    transition: border 0.15s;
  }
  .record-field input:focus, .record-field textarea:focus {
    border-color: var(--accent2);
    background: white;
  }

  .save-btn {
    background: var(--accent2);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 7px 14px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 12px;
    cursor: pointer;
    align-self: flex-end;
    transition: opacity 0.15s;
  }
  .save-btn:hover { opacity: 0.85; }

  /* ── 슬롯 모달 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(44, 40, 37, 0.35);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-width: 430px;
    animation: slideUp 0.25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-slot-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 12px;
  }
  .modal-title {
    font-size: 15px;
    margin-bottom: 14px;
  }
  .modal-cats {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-bottom: 14px;
  }
  .modal-cat-chip {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 20px;
    padding: 7px 16px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Gowun Dodum', sans-serif;
  }
  .modal-cat-chip:hover, .modal-cat-chip.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .modal-input {
    width: 100%;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 13px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    color: var(--text);
    outline: none;
    margin-bottom: 14px;
    transition: border 0.15s;
  }
  .modal-input:focus { border-color: var(--accent); background: white; }
  .modal-input::placeholder { color: var(--text-muted); }

  .modal-actions {
    display: flex;
    gap: 8px;
  }
  .modal-cancel {
    flex: 1;
    background: var(--surface2);
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
  }
  .modal-save {
    flex: 2;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    padding: 11px;
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 13px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: opacity 0.15s;
  }
  .modal-save:hover { opacity: 0.88; }

  /* ── 하단 탭 ── */
  .bottom-tab {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 430px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 10px 0 18px;
  }
  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Gowun Dodum', sans-serif;
    color: var(--text-muted);
    font-size: 10px;
    padding: 0;
    transition: color 0.15s;
  }
  .tab-btn .tab-icon { font-size: 18px; }
  .tab-btn.active { color: var(--accent); }

  .recent-chip {
    border-style: solid !important;
    font-weight: 600;
    opacity: 0.85;
  }

  .hour-modal-body {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* scrollbar */
  .timeline-section::-webkit-scrollbar { width: 3px; }
  .timeline-section::-webkit-scrollbar-track { background: transparent; }
  .timeline-section::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="header">
  <div class="date-nav">
    <button onclick="changeDate(-1)">‹</button>
    <div class="date-label">
      <strong id="dateLabel">오늘</strong>
      <span id="dateSubLabel">2025년 4월 4일 토요일</span>
    </div>
    <button onclick="changeDate(1)">›</button>
  </div>

  <!-- 현재 슬롯 포커스 카드 -->
  <div class="focus-card">
    <div class="focus-card-top">
      <!-- 왼쪽: 현재 슬롯 -->
      <div class="focus-slot-block">
        <div class="focus-slot-label">현재 슬롯</div>
        <div class="focus-slot-time" id="currentSlotTime">14:30–14:45</div>
        <div class="focus-category empty" id="currentCategory">미입력</div>
      </div>
      <!-- 가운데: 현재 시각 -->
      <div class="focus-now-block">
        <div class="focus-now-label">현재 시각</div>
        <div class="focus-now-time" id="nowTime">14:32</div>
      </div>
      <!-- 오른쪽: 남은 시간 -->
      <div class="focus-timer-block">
        <div class="focus-timer-label">남은 시간</div>
        <div class="focus-timer-value" id="timerText">8분 23초</div>
      </div>
    </div>
    <!-- 프로그레스 바 -->
    <div class="focus-progress-wrap">
      <div class="focus-progress-time" id="progressStart">14:30</div>
      <div class="focus-progress-bar">
        <div class="focus-progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="focus-progress-time" id="progressEnd">14:45</div>
    </div>
  </div>
</div>

<!-- 타임라인 -->
<div class="timeline-section" id="timeline"></div>

<!-- 일괄 선택 바 -->
<div class="bulk-bar" id="bulkBar">
  <div class="bulk-bar-title"><span id="bulkCount">0</span>개 슬롯 선택됨</div>
  <div class="bulk-bar-cats">
    <div class="bulk-cat-chip" onclick="applyBulkCat('🚗 운전')">🚗 운전</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('👶 도하')">👶 도하</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('🍚 식사')">🍚 식사</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('💼 업무')">💼 업무</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('📚 공부')">📚 공부</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('🏃 운동')">🏃 운동</div>
    <div class="bulk-cat-chip" onclick="applyBulkCat('😴 휴식')">😴 휴식</div>
  </div>
  <div class="bulk-input-row">
    <input class="bulk-input" id="bulkInput" placeholder="직접 입력 후 엔터..." />
    <button class="bulk-save-btn" onclick="applyBulkCustom()">저장</button>
  </div>
  <button class="bulk-cancel-btn" onclick="clearSelection()">선택 취소</button>
</div>

<!-- 슬롯 모달 -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-slot-time" id="modalSlotTime">14:30 – 14:45</div>
    <div class="modal-title">이 시간에 뭘 했나요?</div>
    <div id="recentCatChip" class="modal-cat-chip recent-chip" style="display:none; margin-bottom:8px;" onclick="selectModalCatAndSave(this.dataset.catval)"></div>
    <div class="modal-cats">
      <div class="modal-cat-chip" data-catval="🚗 운전" onclick="selectModalCatAndSave('🚗 운전')">🚗 운전</div>
      <div class="modal-cat-chip" data-catval="👶 도하" onclick="selectModalCatAndSave('👶 도하')">👶 도하</div>
      <div class="modal-cat-chip" data-catval="🍚 식사" onclick="selectModalCatAndSave('🍚 식사')">🍚 식사</div>
      <div class="modal-cat-chip" data-catval="💼 업무" onclick="selectModalCatAndSave('💼 업무')">💼 업무</div>
      <div class="modal-cat-chip" data-catval="📚 공부" onclick="selectModalCatAndSave('📚 공부')">📚 공부</div>
      <div class="modal-cat-chip" data-catval="🏃 운동" onclick="selectModalCatAndSave('🏃 운동')">🏃 운동</div>
      <div class="modal-cat-chip" data-catval="😴 휴식" onclick="selectModalCatAndSave('😴 휴식')">😴 휴식</div>
    </div>
    <input class="modal-input" id="modalInput" placeholder="직접 입력 후 엔터..." />
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()">취소</button>
      <button class="modal-save" onclick="deleteSlot()" style="background:#F5E0DE; color:#C0706A;">🗑</button>
      <button class="modal-save" onclick="saveSlot()">저장</button>
    </div>
  </div>
</div>

<!-- 시간당 기록 모달 -->
<div class="modal-overlay" id="hourModalOverlay" onclick="closeHourModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-slot-time" id="hourModalTitle">14시 기록</div>
    <div class="hour-modal-body">
      <div class="record-field">
        <label>🍽 먹은 것</label>
        <input type="text" id="hourModalFood" placeholder="예: 아메리카노, 바나나" />
      </div>
      <div class="record-field">
        <label>🛍 산 것</label>
        <input type="text" id="hourModalBuy" placeholder="예: 편의점 과자 2,000원" />
      </div>
      <div class="record-field">
        <label>💡 인사이트</label>
        <textarea id="hourModalInsight" rows="3" placeholder="이 시간에 깨달은 것, 생각..."></textarea>
      </div>
    </div>
    <div class="modal-actions" style="margin-top:14px">
      <button class="modal-cancel" onclick="closeHourModal()">취소</button>
      <button class="modal-save" onclick="saveHourModal()">저장</button>
    </div>
  </div>
</div>

<!-- 하단 탭 -->
<div class="bottom-tab">
  <button class="tab-btn active">
    <span class="tab-icon">📋</span>
    오늘
  </button>
  <button class="tab-btn">
    <span class="tab-icon">📊</span>
    리뷰
  </button>
  <button class="tab-btn">
    <span class="tab-icon">⚙️</span>
    설정
  </button>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwfRCJSLMlIyMRA5PKGruqoTo1yt-de57wDbhafTlOZhjsI0T0jTa0MZB7_UTWLIKnj/exec';

  const CAT_PALETTE = [
    '#FADADD','#D4ECD4','#FDE9C2','#D4E4F7','#E8D4F0',
    '#FFE4CC','#D4F0E8','#F0EAD4','#F7D4E8','#D4D4F7',
  ];
  const catColorMap = {};
  let colorIndex = 0;
  function getCatColor(cat) {
    if (!cat) return null;
    if (!catColorMap[cat]) { catColorMap[cat] = CAT_PALETTE[colorIndex % CAT_PALETTE.length]; colorIndex++; }
    return catColorMap[cat];
  }

  const slotData = {};
  const hourData = {};
  let lastUsedCat = '';
  let selectedModalCat = '';
  let editingSlotKey = '';
  let editingHourKey = '';
  let dateOffset = 0;

  // 다중 선택
  let selectedSlots = new Set();
  let isDragging = false;
  let dragStartKey = null;

  // ── 시간 계산 ──
  function getNow() { return new Date(); }
  function realHour(h) { return h >= 24 ? h - 24 : h; }
  function getSlotKey(h, m) { return `${String(realHour(h)).padStart(2,'0')}:${String(m).padStart(2,'0')}`; }
  function displayHour(h) { return h >= 24 ? `+${String(h-24).padStart(2,'0')}` : String(h).padStart(2,'0'); }
  function isInRange(h) { return h >= 6 && h <= 27; }

  function getCurrentSlot() {
    const now = getNow();
    const rh = now.getHours();
    const m = Math.floor(now.getMinutes() / 15) * 15;
    const h = rh < 4 ? rh + 24 : rh;
    return { h, m, key: getSlotKey(h, m) };
  }
  function getSecondsLeft() {
    const now = getNow();
    return 15 * 60 - ((now.getMinutes() % 15) * 60 + now.getSeconds());
  }
  function getDateStr(offset) {
    const d = new Date();
    d.setDate(d.getDate() + (offset !== undefined ? offset : dateOffset));
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // ── 타이머 & 현재시각 ──
  let lastSlotKey = '';
  function updateTimer() {
    const secs = getSecondsLeft();
    const m = Math.floor(secs / 60), s = secs % 60;

    // 남은 시간 텍스트
    document.getElementById('timerText').textContent = `${m}분 ${String(s).padStart(2,'0')}초`;

    // 프로그레스 바 (경과 비율)
    const pct = ((15 * 60 - secs) / (15 * 60)) * 100;
    document.getElementById('progressFill').style.width = `${pct}%`;

    // 현재 시각
    const now = getNow();
    document.getElementById('nowTime').textContent =
      `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    const { key } = getCurrentSlot();
    if (key !== lastSlotKey) { lastSlotKey = key; buildTimeline(); updateFocusCard(); }
  }

  // ── 포커스 카드 ──
  function updateFocusCard() {
    const { h, m } = getCurrentSlot();
    const endM = m + 15, endH = endM >= 60 ? h+1 : h, endMM = endM >= 60 ? 0 : endM;
    const startStr = `${displayHour(h)}:${String(m).padStart(2,'0')}`;
    const endStr = `${displayHour(endH)}:${String(endMM).padStart(2,'0')}`;
    document.getElementById('currentSlotTime').textContent = `${startStr}–${endStr}`;
    document.getElementById('progressStart').textContent = startStr;
    document.getElementById('progressEnd').textContent = endStr;

    const { key } = getCurrentSlot();
    const d = slotData[key];
    const cat = d?.cat || d?.customCat || '';
    const catEl = document.getElementById('currentCategory');
    catEl.textContent = cat || '미입력';
    catEl.className = 'focus-category' + (cat ? '' : ' empty');
  }

  // ── 날짜 ──
  function changeDate(d) {
    dateOffset += d;
    const dt = new Date(); dt.setDate(dt.getDate() + dateOffset);
    const days = ['일','월','화','수','목','금','토'];
    document.getElementById('dateLabel').textContent =
      dateOffset===0?'오늘':dateOffset===-1?'어제':dateOffset===1?'내일':`${dt.getMonth()+1}월 ${dt.getDate()}일`;
    document.getElementById('dateSubLabel').textContent =
      `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일 ${days[dt.getDay()]}요일`;
    clearSelection();
    buildTimeline();
    loadFromSheet(getDateStr());
  }

  // ── 저장 공통 ──
  function persistSlot(key, cat) {
    if (!slotData[key]) slotData[key] = {};
    slotData[key].cat = cat;
    slotData[key].customCat = '';
    lastUsedCat = cat;
    getCatColor(cat);
    fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      body: JSON.stringify({ type:'slot', date: getDateStr(), time: key, cat })
    }).catch(e => console.log(e));
  }

  // ── 타임라인 빌드 ──
  function buildTimeline() {
    const timeline = document.getElementById('timeline');
    timeline.innerHTML = '';
    const { h: curH, m: curM } = getCurrentSlot();

    for (let h = 6; h <= 27; h++) {
      const hKey = String(realHour(h)).padStart(2,'0');
      const hd = hourData[hKey] || {};
      const hasData = hd.food || hd.buy || hd.insight;

      const row = document.createElement('div');
      row.className = 'hour-row';
      row.id = `hour-row-${h}`;

      // 시간 레이블 (모바일: 탭하면 행 전체 선택)
      const label = document.createElement('div');
      label.className = 'hour-label';
      label.style.color = h >= 24 ? '#B8A8D4' : '';
      label.textContent = h >= 24 ? `+${String(h-24).padStart(2,'0')}` : String(h).padStart(2,'0');
      label.addEventListener('click', () => selectHourRow(h));
      row.appendChild(label);

      // 슬롯 4개
      [0,15,30,45].forEach(min => {
        const key = getSlotKey(h, min);
        const d = slotData[key] || {};
        const isActive = dateOffset===0 && h===curH && min===curM;
        const isPast = dateOffset<0 || (dateOffset===0 && (h<curH || (h===curH && min<curM)));
        const cat = d.cat || d.customCat || '';
        const color = cat ? getCatColor(cat) : null;
        const isSelected = selectedSlots.has(key);

        const slot = document.createElement('div');
        slot.className = `slot${isActive?' active':''}${isPast&&!isActive?' past':''}${color?' colored':''}${isSelected?' selected':''}`;
        slot.id = `slot-${key}-${h}`;
        slot.dataset.key = key;

        if (color && !isActive && !isSelected) {
          slot.style.backgroundColor = color;
          slot.style.borderColor = color;
        }

        slot.innerHTML = `<div class="slot-time">:${String(min).padStart(2,'0')}</div>${cat?`<div class="slot-cat-label">${cat}</div>`:''}`;

        // PC 드래그 이벤트
        slot.addEventListener('mousedown', e => { e.preventDefault(); startDrag(key, slot); });
        slot.addEventListener('mouseover', () => { if (isDragging) extendDrag(key, slot); });
        slot.addEventListener('mouseup', () => endDrag());
        // 클릭 (드래그 아닌 경우)
        slot.addEventListener('click', () => {
          if (!isDragging && selectedSlots.size === 0) openModal(key, h, min);
        });

        row.appendChild(slot);
      });

      // 📝 버튼
      const noteBtn = document.createElement('button');
      noteBtn.className = `hour-note-btn${hasData?' has-data':''}`;
      noteBtn.textContent = hasData ? '✓' : '📝';
      noteBtn.onclick = () => openHourModal(hKey, h>=24?h-24:h);
      row.appendChild(noteBtn);

      timeline.appendChild(row);
    }

    if (dateOffset===0 && isInRange(curH)) {
      setTimeout(() => {
        const el = document.getElementById(`hour-row-${curH}`);
        if (el) el.scrollIntoView({ behavior:'smooth', block:'center' });
      }, 100);
    }
  }

  // ── 드래그 선택 (PC) ──
  let dragKeys = [];
  function startDrag(key, el) {
    isDragging = true;
    dragKeys = [key];
    dragStartKey = key;
    selectedSlots = new Set([key]);
    el.classList.add('selected');
    document.addEventListener('mouseup', endDrag, { once: true });
  }
  function extendDrag(key) {
    if (!isDragging) return;
    if (!dragKeys.includes(key)) dragKeys.push(key);
    selectedSlots = new Set(dragKeys);
    updateSelectionUI();
  }
  function endDrag() {
    if (!isDragging) return;
    isDragging = false;
    if (selectedSlots.size > 1) {
      showBulkBar();
    } else if (selectedSlots.size === 1) {
      // 단일 클릭처럼 모달 열기
      const key = [...selectedSlots][0];
      selectedSlots.clear();
      updateSelectionUI();
      // key에서 h, min 파싱
      const [hStr, mStr] = key.split(':');
      const rh = parseInt(hStr), min = parseInt(mStr);
      const h = rh < 4 ? rh + 24 : rh;
      openModal(key, h, min);
    }
  }

  // ── 모바일: 시간 레이블 탭으로 행 전체 선택 ──
  function selectHourRow(h) {
    const keys = [0,15,30,45].map(m => getSlotKey(h, m));
    const allSelected = keys.every(k => selectedSlots.has(k));
    if (allSelected) {
      keys.forEach(k => selectedSlots.delete(k));
    } else {
      keys.forEach(k => selectedSlots.add(k));
    }
    updateSelectionUI();
    if (selectedSlots.size > 0) showBulkBar();
    else hideBulkBar();
  }

  function updateSelectionUI() {
    document.querySelectorAll('.slot').forEach(el => {
      el.classList.toggle('selected', selectedSlots.has(el.dataset.key));
    });
    document.querySelectorAll('.hour-label').forEach(label => {
      const row = label.parentElement;
      const h = parseInt(row.id.replace('hour-row-',''));
      const keys = [0,15,30,45].map(m => getSlotKey(h, m));
      label.classList.toggle('row-selected', keys.every(k => selectedSlots.has(k)));
    });
    document.getElementById('bulkCount').textContent = selectedSlots.size;
  }

  function showBulkBar() {
    document.getElementById('bulkCount').textContent = selectedSlots.size;
    document.getElementById('bulkBar').classList.add('open');
  }
  function hideBulkBar() {
    document.getElementById('bulkBar').classList.remove('open');
    document.getElementById('bulkInput').value = '';
  }
  function clearSelection() {
    selectedSlots.clear();
    updateSelectionUI();
    hideBulkBar();
  }

  function applyBulkCat(cat) {
    selectedSlots.forEach(key => persistSlot(key, cat));
    clearSelection();
    buildTimeline();
    updateFocusCard();
  }
  function applyBulkCustom() {
    const val = document.getElementById('bulkInput').value.trim();
    if (!val) return;
    applyBulkCat(val);
  }

  // ── 시간당 기록 ──
  function openHourModal(hKey, hour) {
    editingHourKey = hKey;
    const hd = hourData[hKey] || {};
    document.getElementById('hourModalTitle').textContent = `${hour}시 기록`;
    document.getElementById('hourModalFood').value = hd.food || '';
    document.getElementById('hourModalBuy').value = hd.buy || '';
    document.getElementById('hourModalInsight').value = hd.insight || '';
    document.getElementById('hourModalOverlay').classList.add('open');
  }
  function saveHourModal() {
    if (!hourData[editingHourKey]) hourData[editingHourKey] = {};
    hourData[editingHourKey].food = document.getElementById('hourModalFood').value;
    hourData[editingHourKey].buy = document.getElementById('hourModalBuy').value;
    hourData[editingHourKey].insight = document.getElementById('hourModalInsight').value;
    document.getElementById('hourModalOverlay').classList.remove('open');
    buildTimeline();
    fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ type:'hour', date:getDateStr(), hour:editingHourKey,
        food:hourData[editingHourKey].food, buy:hourData[editingHourKey].buy, insight:hourData[editingHourKey].insight })
    }).catch(e => console.log(e));
  }
  function closeHourModal(e) {
    if (!e || e.target===document.getElementById('hourModalOverlay'))
      document.getElementById('hourModalOverlay').classList.remove('open');
  }

  // ── 슬롯 모달 ──
  function getPrevSlotCat(h, min) {
    let prevMin = min - 15, prevH = h;
    if (prevMin < 0) { prevMin = 45; prevH = h - 1; }
    if (!isInRange(prevH)) return '';
    const prevKey = getSlotKey(prevH, prevMin);
    const d = slotData[prevKey];
    return d?.cat || d?.customCat || '';
  }

  function openModal(key, h, min) {
    editingSlotKey = key;
    const endMin = min+15, endH = endMin>=60?h+1:h, endMM = endMin>=60?0:endMin;
    document.getElementById('modalSlotTime').textContent =
      `${displayHour(h)}:${String(min).padStart(2,'0')} – ${displayHour(endH)}:${String(endMM).padStart(2,'0')}`;
    document.getElementById('modalInput').value = slotData[key]?.customCat || '';

    // 추천: 직전 슬롯 카테고리 우선, 없으면 lastUsedCat
    const prevCat = getPrevSlotCat(h, min);
    const recentCat = prevCat || lastUsedCat;
    const recentChip = document.getElementById('recentCatChip');
    if (recentCat) {
      recentChip.style.display = 'block';
      recentChip.textContent = `↩ ${recentCat}`;
      recentChip.style.backgroundColor = getCatColor(recentCat) || '#F0EDE8';
      recentChip.dataset.catval = recentCat;
    } else {
      recentChip.style.display = 'none';
    }

    const currentCat = slotData[key]?.cat || slotData[key]?.customCat || '';
    document.querySelectorAll('.modal-cat-chip').forEach(c => {
      c.classList.toggle('selected', c.dataset.catval === currentCat);
    });
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (!e || e.target===document.getElementById('modalOverlay'))
      document.getElementById('modalOverlay').classList.remove('open');
  }

  // 칩 클릭 → 즉시 저장
  function selectModalCatAndSave(cat) {
    persistSlot(editingSlotKey, cat);
    document.getElementById('modalOverlay').classList.remove('open');
    buildTimeline();
    updateFocusCard();
  }

  function saveSlot() {
    const custom = document.getElementById('modalInput').value.trim();
    if (!custom) return;
    if (!slotData[editingSlotKey]) slotData[editingSlotKey] = {};
    slotData[editingSlotKey].cat = '';
    slotData[editingSlotKey].customCat = custom;
    lastUsedCat = custom;
    getCatColor(custom);
    document.getElementById('modalOverlay').classList.remove('open');
    buildTimeline();
    updateFocusCard();
    fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ type:'slot', date:getDateStr(), time:editingSlotKey, cat:custom })
    }).catch(e => console.log(e));
  }

  function deleteSlot() {
    delete slotData[editingSlotKey];
    document.getElementById('modalOverlay').classList.remove('open');
    buildTimeline();
    updateFocusCard();
    fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      body: JSON.stringify({ type:'slot', date:getDateStr(), time:editingSlotKey, cat:'' })
    }).catch(e => console.log(e));
  }

  // ── 시트에서 불러오기 ──
  function loadFromSheet(date) {
    fetch(`${SCRIPT_URL}?date=${date}`)
      .then(r => r.json())
      .then(data => {
        // 해당 날짜 데이터 초기화
        Object.keys(slotData).forEach(k => delete slotData[k]);
        Object.keys(hourData).forEach(k => delete hourData[k]);
        data.slots.forEach(s => { slotData[s.time] = { cat: s.cat, customCat:'' }; getCatColor(s.cat); });
        data.hours.forEach(h => { hourData[h.hour] = { food:h.food, buy:h.buy, insight:h.insight }; });
        buildTimeline();
        updateFocusCard();
      }).catch(e => console.log(e));
  }

  // ── 초기화 ──
  function init() {
    changeDate(0);
    updateFocusCard();
    lastSlotKey = getCurrentSlot().key;
    updateTimer();
    setInterval(updateTimer, 1000);

    // bulk input 엔터
    document.getElementById('bulkInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') applyBulkCustom();
    });
    // 모달 input 엔터
    document.getElementById('modalInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') saveSlot();
    });
  }

  init();
</script>
</body>
</html>
